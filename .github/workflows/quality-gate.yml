name: Quality Gate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # package-lock is generated with npm 11; Node 22's npm 10 reports lock out of sync (peer/esbuild).
      # Use npx to run npm@11 (no global install; avoids GHA permission errors on `npm i -g npm`).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npx -y npm@11 ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit and non-DB tests
        run: npm run test

      - name: Server build
        run: npm run server:build
